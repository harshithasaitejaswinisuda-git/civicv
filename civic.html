<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicVoice - Civic Issue Reporting System</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1565C0;
color:white;
text-align:center;
padding:20px;
}

.container{
width:400px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1565C0;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.link{
text-align:center;
margin-top:10px;
}

.hidden{
display:none;
}

</style>

<script>

function showRegister(){
document.getElementById("login").classList.add("hidden")
document.getElementById("register").classList.remove("hidden")
}

function showLogin(){
document.getElementById("register").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")
}

function showComplaint(){
document.getElementById("login").classList.add("hidden")
document.getElementById("complaint").classList.remove("hidden")
}

</script>

</head>

<body>

<header>
<h1>🔔 CivicVoice</h1>
<p>Civic Issue Reporting System</p>
</header>


<!-- LOGIN PAGE -->

<div class="container" id="login">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="showComplaint()">Login</button>

<div class="link">
<p>Don't have an account?</p>
<button onclick="showRegister()">Register</button>
</div>

</div>


<!-- REGISTER PAGE -->

<div class="container hidden" id="register">

<h2>Register</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Phone Number">

<input type="password" placeholder="Password">

<select>
<option>User</option>
<option>Admin</option>
</select>

<button>Register</button>

<div class="link">
<button onclick="showLogin()">Back to Login</button>
</div>

</div>


<!-- COMPLAINT SUBMISSION PAGE -->

<div class="container hidden" id="complaint">

<h2>Submit Complaint</h2>

<input type="text" placeholder="Complaint Title">

<select>
<option>Roads</option>
<option>Waste Management</option>
<option>Water Leakage</option>
<option>Streetlight</option>
<option>Other</option>
</select>

<input type="text" placeholder="Location">

<textarea placeholder="Complaint Description"></textarea>

<select>
<option>Low</option>
<option>Normal</option>
<option>High</option>
<option>Critical</option>
</select>

<input type="file">

<button>Submit Complaint</button>

</div>

</body>
</html>
